services:
  - type: web
    name: dropship-backend
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput
    startCommand: /opt/render/project/src/.venv/bin/gunicorn dropship_backend.wsgi:application --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dropship-db
          property: connection_string
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*.render.com"
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.console.EmailBackend"
      - key: DEFAULT_FROM_EMAIL
        value: "noreply@dropship.com"
      - key: FRONTEND_URL
        value: "https://your-frontend.onrender.com"
      - key: AWS_STORAGE_BUCKET_NAME
        fromSecret: AWS_STORAGE_BUCKET_NAME
      - key: AWS_ACCESS_KEY_ID
        fromSecret: AWS_ACCESS_KEY_ID
      - key: AWS_SECRET_ACCESS_KEY
        fromSecret: AWS_SECRET_ACCESS_KEY
    disk:
      name: media-files
      mountPath: /opt/render/project/src/media
      sizeGB: 1

  - type: psql
    name: dropship-db
    plan: free